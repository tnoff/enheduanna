name: Pull Request Checks

on:
  - pull_request

jobs:
  check-pins:
    uses: tnoff/github-workflows/.github/workflows/check-action-pins.yml@a67b99238aa5f23f5015cab31d81da16101f42f1
  coverage:
    uses: tnoff/github-workflows/.github/workflows/coverage-check.yml@5a3473dcbf9095c0e2137fa209bf1d10bc9f791f
    permissions:
      contents: read
      actions: read
    with:
      coverage_source: enheduanna
      install_command: pip install -r requirements.txt -r tests/requirements.txt
      python_version: 3.14
      fail_on_diff_cover: true
  spellcheck:
      name: Spellcheck
      runs-on: ubuntu-24.04
      steps:
        - uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744
        - uses: rojopolis/spellcheck-github-actions@e3cd8e9aec4587ec73bc0e60745aafd45c37aa2e
          name: Spellcheck
          with:
            config_path: .spellcheck/spellcheck.yml # put path to configuration file here
            task_name: Markdown
  build:
    name: Tox
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    strategy:
      matrix:
        python-version: ['3.11', '3.12', '3.13', '3.14']
    steps:
    - uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@7f4fc3e22c37d6ff65e88745f38bd3157c663f7c
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install tox tox-gh-actions
    - name: Test with tox
      run: tox -v
  docker:
    name: Docker
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
    - uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd
    - name: Build image
      uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294
      with:
        push: false