name: Pull Request Checks

on:
  - pull_request

jobs:
  check-pins:
    uses: tnoff/github-workflows/.github/workflows/check-action-pins.yml@5a3473dcbf9095c0e2137fa209bf1d10bc9f791f
  coverage:
    uses: tnoff/github-workflows/.github/workflows/coverage-check.yml@5a3473dcbf9095c0e2137fa209bf1d10bc9f791f
    permissions:
      contents: read
      actions: read
    with:
      coverage_source: enheduanna
      install_command: pip install -r requirements.txt -r tests/requirements.txt
      python_version: 3.14
      fail_on_diff_cover: true
  spellcheck:
      name: Spellcheck
      runs-on: ubuntu-24.04
      steps:
        - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        - uses: rojopolis/spellcheck-github-actions@e3cd8e9aec4587ec73bc0e60745aafd45c37aa2e
          name: Spellcheck
          with:
            config_path: .spellcheck/spellcheck.yml # put path to configuration file here
            task_name: Markdown
  build:
    name: Tox
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    strategy:
      matrix:
        python-version: ['3.11', '3.12', '3.13', '3.14']
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install tox tox-gh-actions
    - name: Test with tox
      run: tox -v
  docker:
    name: Docker
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd
    - name: Build image
      uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f
      with:
        push: false