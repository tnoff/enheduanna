name: Dependabot Auto Approve

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  # test requirements: any update type, filtered by path
  auto-approve-test-reqs:
    permissions:
      contents: write
      pull-requests: write
    uses: tnoff/github-workflows/.github/workflows/dependabot-auto-approve.yml@bbe97497e09b0f728446f9f3a93daa897e2d64a1
    with:
      file_pattern: 'tests/**'
      allowed_update_types: 'major,minor,patch'
    secrets:
      bot_token: ${{ secrets.APPROVAL_BOT_PAT }}