name: Dependabot Auto Approve

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  bump-version:
    permissions:
      contents: write
    uses: tnoff/github-workflows/.github/workflows/bump-version.yml@1dcefc7c5dfeb21105e3256bf21fc97b8552252e
    with:
      paths: '["pyproject.toml"]'
      version_file: './VERSION'
  auto-approve-test-deps:
    permissions:
      contents: write
      pull-requests: write
    uses: tnoff/github-workflows/.github/workflows/dependabot-auto-approve.yml@1dcefc7c5dfeb21105e3256bf21fc97b8552252e
    with:
      dependency_groups: 'test-dependencies'
      allowed_update_types: 'major,minor,patch'
    secrets:
      bot_token: ${{ secrets.APPROVAL_BOT_PAT }}

  auto-approve-patch:
    permissions:
      contents: write
      pull-requests: write
    uses: tnoff/github-workflows/.github/workflows/dependabot-auto-approve.yml@1dcefc7c5dfeb21105e3256bf21fc97b8552252e
    with:
      file_pattern: '**'
      allowed_update_types: 'patch'
    secrets:
      bot_token: ${{ secrets.APPROVAL_BOT_PAT }}

  auto-approve-ci:
    permissions:
      contents: write
      pull-requests: write
    uses: tnoff/github-workflows/.github/workflows/dependabot-auto-approve.yml@1dcefc7c5dfeb21105e3256bf21fc97b8552252e
    with:
      file_pattern: '.github/workflows/ci.yml'
      allowed_update_types: 'major,minor,patch'
    secrets:
      bot_token: ${{ secrets.APPROVAL_BOT_PAT }}




