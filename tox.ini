[tox]
min_version = 4.0
env_list =
    py311
    py312
    py313
    py314

[pytest]
filterwarnings =
    error
    # Freezegun warning, see if we can remove eventually
    ignore::DeprecationWarning:pytest_freezegun
    ignore::DeprecationWarning:setuptools._distutils

[testenv]
deps =
    .[test]
commands =
    bandit -r enheduanna/
    pylint enheduanna/
    pytest --cov=enheduanna --cov-report=xml --cov-fail-under=100 tests/
