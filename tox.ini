[tox]
min_version = 4.0
env_list =
    py311
    py312
    py313

[pytest]
filterwarnings =
    error
    # Freezegun warning, see if we can remove eventually
    ignore::DeprecationWarning:pytest_freezegun
    ignore::DeprecationWarning:setuptools._distutils

[testenv]
deps =
    -r requirements.txt
    -r tests/requirements.txt
commands =
    pylint enheduanna/
    pytest --cov=enheduanna --cov-fail-under=95 tests/
